<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #fff;
    }
    .header {
      background: #1E4D8C;
      color: #fff;
      padding: 14px 16px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 700;
    }
    .header p {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }
    .body {
      padding: 16px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      color: #1e293b;
      cursor: pointer;
    }
    select:focus {
      outline: none;
      border-color: #1E4D8C;
      box-shadow: 0 0 0 2px rgba(30, 77, 140, 0.15);
    }
    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      display: none;
    }
    .status.success {
      display: block;
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }
    .status.warning {
      display: block;
      background: #fefce8;
      color: #ca8a04;
      border: 1px solid #fef08a;
    }
    .info {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #f1f5f9;
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MR Umbau</h1>
    <p>Bestellerkennung</p>
  </div>
  <div class="body">
    <label for="kuerzel">Benutzer</label>
    <select id="kuerzel">
      <option value="">-- Bitte wählen --</option>
      <option value="MT">Marlon Tschon (MT)</option>
      <option value="CR">Carsten Reuter (CR)</option>
      <option value="MH">Mohammed Hawrami (MH)</option>
    </select>
    <div id="status" class="status"></div>
    <div class="info">
      Bestellungen bei Bauhaus, OBI, Amazon und Würth werden automatisch erkannt und an cloud.mrumbau.de gemeldet.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
