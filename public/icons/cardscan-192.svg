<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="24" fill="#570006"/>
  <g transform="translate(96,96)">
    <!-- Camera body -->
    <rect x="-48" y="-28" width="96" height="64" rx="8" fill="none" stroke="#fff" stroke-width="4"/>
    <!-- Camera lens -->
    <circle cx="0" cy="4" r="20" fill="none" stroke="#fff" stroke-width="4"/>
    <circle cx="0" cy="4" r="8" fill="#fff" opacity="0.3"/>
    <!-- Flash -->
    <rect x="-32" y="-36" width="24" height="12" rx="4" fill="none" stroke="#fff" stroke-width="3"/>
    <!-- Scan lines -->
    <line x1="-36" y1="44" x2="36" y2="44" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="-28" y1="50" x2="28" y2="50" stroke="#fff" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
